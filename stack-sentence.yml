services:
  frontend:
    image: ${SENTENCE_WEB_IMAGE}
    networks:
      - proxy-net
    deploy:
      mode: replicated
      replicas: 1
      restart_policy:
        condition: any
      resources:
        reservations:
          memory: 16M
        limits:
          memory: 64M
      labels:
        - traefik.enable=true
        - traefik.docker.network=proxy-net
        - traefik.http.routers.sentence-web.rule=Host(`${APP_HOST}`,`${APP_WWW_HOST}`)
        - traefik.http.routers.sentence-web.entrypoints=websecure
        - traefik.http.routers.sentence-web.tls=true
        - traefik.http.routers.sentence-web.tls.certresolver=le
        - traefik.http.routers.sentence-web.priority=10
        - traefik.http.services.sentence-web.loadbalancer.server.port=80

  api:
    image: ${SENTENCE_API_IMAGE}
    networks:
      - proxy-net
      - sentence-net
    environment:
      HTTP_ADDR: ":8080"
      API_KEY_NINJA: ${API_KEY_NINJA}
      MYSQL_DSN: root:${MYSQL_ROOT_PASSWORD}@tcp(mysql:3306)/sentence?parseTime=true&charset=utf8mb4&loc=Local
      ALLOW_ORIGINS: https://${APP_HOST},https://${APP_WWW_HOST}
    deploy:
      mode: replicated
      replicas: 1
      restart_policy:
        condition: any
      resources:
        reservations:
          memory: 32M
        limits:
          memory: 256M
      labels:
        - traefik.enable=true
        - traefik.docker.network=proxy-net
        - traefik.http.middlewares.sentence-api-strip.stripprefix.prefixes=/api
        - traefik.http.routers.sentence-api.rule=Host(`${APP_HOST}`,`${APP_WWW_HOST}`) && (Path(`/api`) || PathPrefix(`/api/`))
        - traefik.http.routers.sentence-api.entrypoints=websecure
        - traefik.http.routers.sentence-api.middlewares=sentence-api-strip
        - traefik.http.routers.sentence-api.tls=true
        - traefik.http.routers.sentence-api.tls.certresolver=le
        - traefik.http.routers.sentence-api.priority=100
        - traefik.http.services.sentence-api.loadbalancer.server.port=8080

  mysql:
    image: ${SENTENCE_DB_IMAGE}
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: sentence
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - sentence-net
    deploy:
      mode: replicated
      replicas: 1
      restart_policy:
        condition: any
      resources:
        reservations:
          memory: 128M
        limits:
          memory: 512M
      placement:
        constraints:
          - node.role == manager

networks:
  proxy-net:
    external: true
  sentence-net:
    driver: overlay

volumes:
  mysql_data:
